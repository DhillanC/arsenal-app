{{define "layout_start"}}
<!DOCTYPE html>
<html lang="es" class="{{if .DarkMode}}dark{{end}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Arsenal App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="/static/css/styles.css">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- Theme Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: {
                            primary: '#b88834',
                            medium: '#ca9250',
                            light: '#fdf3aa',
                            dark: '#6b4010',
                        },
                        cream: '#f9f6f0',
                        'near-black': '#131110',
                        teal: {
                            DEFAULT: '#167485',
                            light: '#5DC8D2',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cream dark:bg-near-black text-gray-900 dark:text-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white/80 dark:bg-near-black/80 backdrop-blur-md border-b border-gold-primary/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Logo -->
                <a href="/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold gradient-text">Arsenal</span>
                </a>
                
                <!-- Nav Links -->
                <div class="hidden md:flex space-x-8">
                    <a href="/replicas" class="nav-link">Réplicas</a>
                    <a href="/dashboard" class="nav-link">Dashboard</a>
                    <a href="/documentos" class="nav-link">Documentos</a>
                    <a href="/mantenimiento" class="nav-link">Mantenimiento</a>
                </div>
                
                <!-- Theme Toggle -->
                <button onclick="toggleTheme()" class="theme-toggle" aria-label="Toggle theme">
                    <svg xmlns="http://www.w3.org/2000/svg" class="sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" class="moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
{{end}}

{{define "layout_end"}}
    </main>
    
    <!-- Footer -->
    <footer class="border-t border-gold-primary/20 mt-12 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-muted-foreground">
            <p>Arsenal App - Gestión de réplicas airsoft</p>
        </div>
    </footer>
    
    <!-- Theme JavaScript -->
    <script src="/static/js/theme.js"></script>
    
    <!-- Initialize Lucide Icons -->
    <script>lucide.createIcons();</script>
</body>
</html>
{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto">
    {{if .EditMode}}
    <nav class="flex items-center space-x-2 text-sm text-muted-foreground mb-4">
        <a href="/replicas" class="hover:text-gold-primary">Réplicas</a>
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
        <a href="/replicas/{{.Replica.ID}}" class="hover:text-gold-primary">{{.Replica.Nombre}}</a>
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
        <span>Editar</span>
    </nav>
    <h1 class="text-3xl font-bold gradient-text mb-6">Editar Réplica</h1>
    {{else}}
    <nav class="flex items-center space-x-2 text-sm text-muted-foreground mb-4">
        <a href="/replicas" class="hover:text-gold-primary">Réplicas</a>
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
        <span>Nueva</span>
    </nav>
    <h1 class="text-3xl font-bold gradient-text mb-6">Nueva Réplica</h1>
    {{end}}

    <form class="card space-y-6" 
          {{if .EditMode}}
          hx-put="/api/v1/replicas/{{.Replica.ID}}"
          {{else}}
          hx-post="/api/v1/replicas"
          {{end}}
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.href='/replicas'">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Nombre -->
            <div class="form-group">
                <label for="nombre" class="form-label">Nombre <span class="text-red-500">*</span></label>
                <input type="text" id="nombre" name="nombre" required
                       value="{{.Replica.Nombre}}"
                       class="form-input"
                       placeholder="Ej: M4A1">
            </div>

            <!-- Marca -->
            <div class="form-group">
                <label for="marca" class="form-label">Marca</label>
                <input type="text" id="marca" name="marca"
                       value="{{.Replica.Marca}}"
                       class="form-input"
                       placeholder="Ej: Tokyo Marui">
            </div>

            <!-- Modelo -->
            <div class="form-group">
                <label for="modelo" class="form-label">Modelo</label>
                <input type="text" id="modelo" name="modelo"
                       value="{{.Replica.Modelo}}"
                       class="form-input"
                       placeholder="Ej: RECCE">
            </div>

            <!-- Tipo -->
            <div class="form-group">
                <label for="tipo" class="form-label">Tipo</label>
                <select id="tipo" name="tipo" class="form-select">
                    <option value="">Seleccionar...</option>
                    <option value="AEG" {{if eq .Replica.Tipo "AEG"}}selected{{end}}>AEG</option>
                    <option value="GBB" {{if eq .Replica.Tipo "GBB"}}selected{{end}}>GBB</option>
                    <option value="HPA" {{if eq .Replica.Tipo "HPA"}}selected{{end}}>HPA</option>
                    <option value="Spring" {{if eq .Replica.Tipo "Spring"}}selected{{end}}>Spring</option>
                </select>
            </div>

            <!-- Número de Serie -->
            <div class="form-group">
                <label for="numero_serie" class="form-label">Número de Serie</label>
                <input type="text" id="numero_serie" name="numero_serie"
                       value="{{.Replica.NumeroSerie}}"
                       class="form-input"
                       placeholder="Ej: TM123456">
            </div>

            <!-- Fecha de Adquisición -->
            <div class="form-group">
                <label for="fecha_adquisicion" class="form-label">Fecha de Adquisición</label>
                <input type="date" id="fecha_adquisicion" name="fecha_adquisicion"
                       value="{{.Replica.FechaAdquisicion.Format "2006-01-02"}}"
                       class="form-input">
            </div>

            <!-- Proveedor -->
            <div class="form-group">
                <label for="proveedor" class="form-label">Proveedor</label>
                <input type="text" id="proveedor" name="proveedor"
                       value="{{.Replica.Proveedor}}"
                       class="form-input"
                       placeholder="Ej: Evike">
            </div>

            <!-- Costo -->
            <div class="form-group">
                <label for="costo_adquisicion" class="form-label">Costo ($)</label>
                <input type="number" id="costo_adquisicion" name="costo_adquisicion" step="0.01" min="0"
                       value="{{.Replica.CostoAdquisicion}}"
                       class="form-input"
                       placeholder="0.00">
            </div>

            <!-- Estado -->
            <div class="form-group">
                <label for="estado" class="form-label">Estado</label>
                <select id="estado" name="estado" class="form-select">
                    <option value="activo" {{if eq .Replica.Estado "activo"}}selected{{end}}>Activo</option>
                    <option value="reparacion" {{if eq .Replica.Estado "reparacion"}}selected{{end}}>En Reparación</option>
                    <option value="vendido" {{if eq .Replica.Estado "vendido"}}selected{{end}}>Vendido</option>
                    <option value="prestado" {{if eq .Replica.Estado "prestado"}}selected{{end}}>Prestado</option>
                </select>
            </div>

            <!-- FPS -->
            <div class="form-group">
                <label for="fps" class="form-label">FPS</label>
                <input type="number" id="fps" name="fps" min="0"
                       value="{{.Replica.FPS}}"
                       class="form-input"
                       placeholder="Ej: 350">
            </div>

            <!-- Joules -->
            <div class="form-group">
                <label for="joules" class="form-label">Joules</label>
                <input type="number" id="joules" name="joules" step="0.01" min="0"
                       value="{{.Replica.Joules}}"
                       class="form-input"
                       placeholder="Ej: 1.14">
            </div>

            <!-- Peso -->
            <div class="form-group">
                <label for="peso_gramos" class="form-label">Peso (g)</label>
                <input type="number" id="peso_gramos" name="peso_gramos" min="0"
                       value="{{.Replica.PesoGramos}}"
                       class="form-input"
                       placeholder="Ej: 2500">
            </div>

            <!-- Longitud -->
            <div class="form-group">
                <label for="longitud_mm" class="form-label">Longitud (mm)</label>
                <input type="number" id="longitud_mm" name="longitud_mm" min="0"
                       value="{{.Replica.LongitudMM}}"
                       class="form-input"
                       placeholder="Ej: 800">
            </div>

            <!-- Hop Up -->
            <div class="form-group">
                <label for="hop_up" class="form-label">Hop Up</label>
                <input type="text" id="hop_up" name="hop_up"
                       value="{{.Replica.HopUp}}"
                       class="form-input"
                       placeholder="Ej: Ajustable">
            </div>

            <!-- Capacidad Cargador -->
            <div class="form-group">
                <label for="capacidad_cargador" class="form-label">Capacidad Cargador</label>
                <input type="number" id="capacidad_cargador" name="capacidad_cargador" min="0"
                       value="{{.Replica.CapacidadCargador}}"
                       class="form-input"
                       placeholder="Ej: 120">
            </div>
        </div>

        <!-- Notas -->
        <div class="form-group">
            <label for="notas" class="form-label">Notas</label>
            <textarea id="notas" name="notas" rows="3" class="form-textarea" placeholder="Notas adicionales sobre la réplica...">{{.Replica.Notas}}</textarea>
        </div>

        <!-- Actions -->
        <div class="flex justify-end space-x-4">
            <a href="/replicas" class="btn-secondary">Cancelar</a>
            <button type="submit" class="btn-primary">
                {{if .EditMode}}Guardar Cambios{{else}}Crear Réplica{{end}}
            </button>
        </div>
    </form>
</div>
{{end}}

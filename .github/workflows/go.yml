name: Go CI

on:
  push:
    branches: [ main, development, staging ]
  pull_request:
    branches: [ main, development ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        # Debe alinear con la directiva `go` en go.mod. Versión menor
        # baja un toolchain auto pero rompe `go tool covdata` con -coverprofile.
        go-version-file: 'go.mod'
        check-latest: true

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: go build -v ./...

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test -v ./... -race -coverprofile=coverage.out
      env:
        OCR_ENABLED: false

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        # v9 instala golangci-lint v2.x compilado con Go reciente. La acción v6
        # forzaba v1.x (built con Go 1.24) e incompatible con go.mod 1.26.
        version: v2.12.2
        args: --timeout=5m

    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage.out
        retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t arsenal-app:test .

    - name: Test Docker image healthcheck
      run: |
        docker run -d --name arsenal-test -p 8080:8080 arsenal-app:test
        sleep 5
        docker ps | grep arsenal-test
        docker stop arsenal-test
        docker rm arsenal-test

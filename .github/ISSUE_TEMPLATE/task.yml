name: Technical Task
description: Track maintenance, setup, documentation, refactoring, or project work.
title: "[Task]: "
labels: ["technical debt"]
body:
  - type: dropdown
    id: task-type
    attributes:
      label: Task type
      description: Choose the closest category.
      options:
        - Implementation
        - Refactor
        - Documentation
        - Infrastructure
        - QA
        - Research
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the work to complete.
      placeholder: Add markdown validation to pull requests.
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why it matters
      description: Explain why this task is useful or necessary.
    validations:
      required: true
  - type: textarea
    id: done-when
    attributes:
      label: Done when
      description: List the concrete completion checks.
      value: |
        - [ ] The required change is complete
        - [ ] Documentation is updated if needed
        - [ ] The result has been checked or reviewed
    validations:
      required: true
  - type: textarea
    id: affected-files
    attributes:
      label: Expected affected areas
      description: List likely files, packages, routes, templates, or workflows.
      placeholder: internal/infrastructure/web, web/templates, .github/workflows, etc.
    validations:
      required: false
  - type: textarea
    id: risks
    attributes:
      label: Risks
      description: Note migration, compatibility, data, or rollout risks.
      placeholder: No known risks.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add links, constraints, or implementation details.
    validations:
      required: false

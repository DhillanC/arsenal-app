name: Feature Request
description: Shape a product feature before implementation.
title: "[Feature]: "
labels: ["enhancement", "feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the feature in one or two paragraphs.
      placeholder: Add a maintenance calendar that shows upcoming work per replica.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: New contributors do not know how to move work through the board.
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Users and scenarios
      description: Who uses this, and in what situation?
      placeholder: |
        - Owner reviewing replicas before a game day
        - Admin checking pending maintenance
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the preferred behavior and UI/API shape.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Clarify what is included and excluded.
      value: |
        Included:
        - ...

        Not included:
        - ...
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this improvement?
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      description: Expected implementation or product risk.
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Define what must be true when this feature is complete.
      value: |
        Given [some context]
        When [certain action is taken]
        Then [the expected outcome is observed]
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies and blockers
      description: List data, design, API, migration, or decision dependencies.
      placeholder: No known blockers.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add related issues, references, screenshots, or assumptions.
    validations:
      required: false

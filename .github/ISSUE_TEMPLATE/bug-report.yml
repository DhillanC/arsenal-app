name: Bug Report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly.
      placeholder: Uploading a document from a replica detail page returns an error.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this affect usage?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      value: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happens instead?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and context
      description: Add screenshots, logs, environment details, or related links.
    validations:
      required: false
  - type: textarea
    id: suspected-area
    attributes:
      label: Suspected area
      description: Optional hint about the affected module, route, template, or workflow.
      placeholder: web/templates/replica_detail.html, documento handler, SQLite migration, etc.
    validations:
      required: false
